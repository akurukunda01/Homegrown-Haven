<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="'Poppins','Trebuchet MS','Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1b2a3a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94A3B8"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#149E48"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#D64545"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#F7F9FB"/>
  <rect x="64" y="44" width="6" height="34" rx="3" fill="#149E48"/>
  <text x="84" y="72" font-family="'Poppins','Trebuchet MS','Segoe UI',Helvetica,Arial,sans-serif" font-size="34" font-weight="700" fill="#0B7A38">Voice Command — End to End</text>
  <text x="64" y="92" font-family="'Poppins','Trebuchet MS','Segoe UI',Helvetica,Arial,sans-serif" font-size="18" fill="#5F6B7A">What happens when a user says “Find coffee shops”</text>


<rect x="88" y="108" width="124" height="42" rx="10" fill="#0B7A38" filter="url(#shadow)"/>
<text x="150" y="134" text-anchor="middle" font-family="'Poppins','Trebuchet MS','Segoe UI',Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#fff">User</text>
<line x1="150" y1="150" x2="150" y2="624" stroke="#CBD5DD" stroke-width="2" stroke-dasharray="4 6"/>
<rect x="228" y="108" width="124" height="42" rx="10" fill="#0B7A38" filter="url(#shadow)"/>
<text x="290" y="134" text-anchor="middle" font-family="'Poppins','Trebuchet MS','Segoe UI',Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#fff">LiveKit</text>
<line x1="290" y1="150" x2="290" y2="624" stroke="#CBD5DD" stroke-width="2" stroke-dasharray="4 6"/>
<rect x="368" y="108" width="124" height="42" rx="10" fill="#0B7A38" filter="url(#shadow)"/>
<text x="430" y="134" text-anchor="middle" font-family="'Poppins','Trebuchet MS','Segoe UI',Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#fff">Deepgram</text>
<line x1="430" y1="150" x2="430" y2="624" stroke="#CBD5DD" stroke-width="2" stroke-dasharray="4 6"/>
<rect x="508" y="108" width="124" height="42" rx="10" fill="#0B7A38" filter="url(#shadow)"/>
<text x="570" y="134" text-anchor="middle" font-family="'Poppins','Trebuchet MS','Segoe UI',Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#fff">LLM</text>
<line x1="570" y1="150" x2="570" y2="624" stroke="#CBD5DD" stroke-width="2" stroke-dasharray="4 6"/>
<rect x="648" y="108" width="124" height="42" rx="10" fill="#0B7A38" filter="url(#shadow)"/>
<text x="710" y="134" text-anchor="middle" font-family="'Poppins','Trebuchet MS','Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="700" fill="#fff">MCP server</text>
<line x1="710" y1="150" x2="710" y2="624" stroke="#CBD5DD" stroke-width="2" stroke-dasharray="4 6"/>
<rect x="788" y="108" width="124" height="42" rx="10" fill="#0B7A38" filter="url(#shadow)"/>
<text x="850" y="134" text-anchor="middle" font-family="'Poppins','Trebuchet MS','Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="700" fill="#fff">Flask API</text>
<line x1="850" y1="150" x2="850" y2="624" stroke="#CBD5DD" stroke-width="2" stroke-dasharray="4 6"/>
<rect x="928" y="108" width="124" height="42" rx="10" fill="#0B7A38" filter="url(#shadow)"/>
<text x="990" y="134" text-anchor="middle" font-family="'Poppins','Trebuchet MS','Segoe UI',Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#fff">React UI</text>
<line x1="990" y1="150" x2="990" y2="624" stroke="#CBD5DD" stroke-width="2" stroke-dasharray="4 6"/>
<rect x="1068" y="108" width="124" height="42" rx="10" fill="#0B7A38" filter="url(#shadow)"/>
<text x="1130" y="134" text-anchor="middle" font-family="'Poppins','Trebuchet MS','Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="700" fill="#fff">ElevenLabs</text>
<line x1="1130" y1="150" x2="1130" y2="624" stroke="#CBD5DD" stroke-width="2" stroke-dasharray="4 6"/>
<line x1="150" y1="196" x2="290" y2="196" stroke="#149E48" stroke-width="2.2" marker-end="url(#arrowG)"/>
<text x="220.0" y="187" text-anchor="middle" font-family="'Poppins','Trebuchet MS','Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#075C2A">speaks the command</text>
<line x1="290" y1="243" x2="430" y2="243" stroke="#149E48" stroke-width="2.2" marker-end="url(#arrowG)"/>
<text x="360.0" y="234" text-anchor="middle" font-family="'Poppins','Trebuchet MS','Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#075C2A">stream audio (WebRTC)</text>
<line x1="430" y1="290" x2="570" y2="290" stroke="#149E48" stroke-width="2.2" marker-end="url(#arrowG)"/>
<text x="500.0" y="281" text-anchor="middle" font-family="'Poppins','Trebuchet MS','Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#075C2A">transcript text</text>
<line x1="570" y1="337" x2="710" y2="337" stroke="#149E48" stroke-width="2.2" marker-end="url(#arrowG)"/>
<text x="640.0" y="328" text-anchor="middle" font-family="'Poppins','Trebuchet MS','Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#075C2A">call search_businesses(“coffee”)</text>
<line x1="710" y1="384" x2="850" y2="384" stroke="#149E48" stroke-width="2.2" marker-end="url(#arrowG)"/>
<text x="780.0" y="375" text-anchor="middle" font-family="'Poppins','Trebuchet MS','Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#075C2A">GET /search_local</text>
<line x1="850" y1="431" x2="710" y2="431" stroke="#94A3B8" stroke-width="2.2" stroke-dasharray="6 5" marker-end="url(#arrow)"/>
<text x="780.0" y="422" text-anchor="middle" font-family="'Poppins','Trebuchet MS','Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#5F6B7A">results (JSON)</text>
<line x1="710" y1="478" x2="990" y2="478" stroke="#149E48" stroke-width="2.2" marker-end="url(#arrowG)"/>
<text x="850.0" y="469" text-anchor="middle" font-family="'Poppins','Trebuchet MS','Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#075C2A">update UI via WebSocket</text>
<line x1="570" y1="525" x2="1130" y2="525" stroke="#149E48" stroke-width="2.2" marker-end="url(#arrowG)"/>
<text x="850.0" y="516" text-anchor="middle" font-family="'Poppins','Trebuchet MS','Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#075C2A">reply text: “I found 8 cafes…”</text>
<line x1="1130" y1="572" x2="150" y2="572" stroke="#149E48" stroke-width="2.2" marker-end="url(#arrowG)"/>
<text x="640.0" y="563" text-anchor="middle" font-family="'Poppins','Trebuchet MS','Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#075C2A">spoken reply</text>
</svg>
